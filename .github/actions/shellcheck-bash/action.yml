name: Strict shellcheck on a bash directory
description: >
  Runs shellcheck at its strictest setting (--severity=style
  --enable=all) over every *.sh file under a given directory. Pass
  `scan-path` to point it at the directory you want covered. Missing
  paths are treated as a no-op so the same action can be safely used
  in repos that may or may not have a given directory.

  Used by Common-Automation's own ci-bash.yml; also intended as a public
  building block for consumers that want the same strict bar applied
  to their own bash without re-deriving the shellcheck flag set.

inputs:
  scan-path:
    description: Directory (relative to the repo root) to scan for *.sh files.
    required: true
  exclude-paths:
    description: >
      Space-separated directory basenames to prune from the walk (matched
      at any depth). Lets a scan-path of '.' cover a repo's own production
      bash while skipping trees linted by another job (.github, scripts),
      test-only (Tests), or vendored (.venv, node_modules,
      .common-automation). Empty (default) scans every *.sh under scan-path.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Strict shellcheck on ${{ inputs.scan-path }}
      shell: bash
      # All logic lives in shellcheck-bash.sh so the strict flag set
      # is a single source of truth - the local pre-push runner
      # references the same file (sourced for the flags array,
      # executed for the full run). exclude-paths is unquoted on purpose
      # so each space-separated basename arrives as its own argument.
      run: |
        '${{ github.action_path }}/shellcheck-bash.sh' \
          '${{ inputs.scan-path }}' ${{ inputs.exclude-paths }}
