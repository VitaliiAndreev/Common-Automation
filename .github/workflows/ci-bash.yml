# Lint and test bash.
#
# Production bash (.github/actions/) and runner bash (scripts/) get
# separate lint jobs so failures are attributable at a glance and the
# two categories can diverge later if their bars need to differ. Both
# currently run at shellcheck's strictest setting via the
# shellcheck-bash composite action under .github/actions/.
#
# Reusable: other repos call this workflow with no inputs. It scans
# the caller's `.github/actions/` and `scripts/` directories; missing
# directories are skipped silently.
#
#   jobs:
#     bash:
#       uses: VitaliiAndreev/GitHub-Common/.github/workflows/ci-bash.yml@master

name: ci-bash

on:
  push:
    branches: [master]
  pull_request:
  workflow_call:
    inputs:
      bats-version:
        # Empty default delegates to the bats composite action, which
        # falls back to .github/lib/versions.env. Single source of truth -
        # set this input explicitly only to pin a different version
        # than the canonical one.
        description: >
          Override bats-core version. Empty (default) uses the
          canonical version from .github/lib/versions.env.
        required: false
        type: string
        default: ''

jobs:
  # Production bash: code shipped to consumers via composite actions.
  # Strictest setting non-negotiable - a regression here ships to
  # every downstream repo.
  shellcheck-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: .github

  # Runner bash: maintainer-side dev scripts (test runners, helpers).
  # Same strict bar as production today; the split exists so the bars
  # can diverge later without re-architecting the workflow.
  shellcheck-runners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: scripts

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-bats
        with:
          # Pass through to the action; empty value (push/PR triggers,
          # or workflow_call without override) makes the action read
          # the canonical version from .github/lib/versions.env.
          bats-version: ${{ inputs.bats-version }}
