# Lint and test bash.
#
# Production bash (.github/), runner bash (scripts/), and domain bash
# (the repo's own production bash outside those, e.g. ops/) get separate
# lint steps so failures are attributable at a glance in the job log and
# the categories can diverge later if their bars need to differ. All run
# at shellcheck's strictest setting via the shellcheck-bash composite.
#
# Everything runs as sequential steps of a single `bash` job, not as
# separate jobs. Two reasons:
#   - One PR check entry instead of six. GitHub surfaces one status
#     check per job (`ci-bash / <job>`), so collapsing to a single job
#     collapses the PR-check list to a single `ci-bash / bash` row.
#   - Fail fast for free. A step carries an implicit `success()` guard,
#     so the first failing step skips every step after it - the heavier
#     checks never run once a lighter one has failed. Steps also share
#     one checkout instead of paying for one per job.
#
# Steps are ordered cheapest-first, lint before test; each step's own
# comment states what it covers and why it sits where it does in the
# order.
#
# Reusable: other repos call this workflow with no inputs. It scans the
# caller's `.github/` and `scripts/` directories explicitly, the rest of
# the repo (domain) by exclusion, and the git hooks; missing or empty
# trees are skipped silently, so a repo with no domain bash is unaffected.
#
#   jobs:
#     bash:
#       uses: Klark-Morrigan/Common-Automation/.github/workflows/ci-bash.yml@master
#
# Every `uses:` for a Common-Automation composite is a local `./` path,
# never a fully-qualified `@master` ref. The reason: GitHub Actions
# eagerly resolves every registry-form `uses:` at job-prep time
# before step-level `if:` guards are evaluated, so a PR that
# introduces a brand new composite would fail prep before any step
# could run. Local refs are resolved at step-execution time after
# checkout has populated the workspace, so they side-step the
# eager-resolution failure mode entirely.
#
# To make `./` work for external consumers (whose workspace does not
# contain Common-Automation's composites), the job does a conditional
# sparse checkout of Common-Automation at master into `.common-automation/`
# and the external branch of each if-guarded pair points there. The self
# branch points at the consumer's own workspace, so PRs to this repo
# exercise the PR's own composite code end-to-end.
#
# Runner selection: each call picks its machine via the `runner` input
# (a per-call / workflow_dispatch override), else the `CI_BASH_RUNNER`
# repo/org variable, else the ubuntu-latest hosted default. The variable
# is read from the CALLER's repository (the `vars` context in a reusable
# workflow resolves to the caller, not this repo), so a private consumer
# routes the bash gate onto its own runner by setting the variable once
# in its settings - no workflow fork - while public repos that set
# nothing stay on free hosted runners. Values are JSON label arrays,
# e.g. `["ubuntu-latest"]` or `["self-hosted","linux"]`.

name: ci-bash

on:
  pull_request:
  # Manual runs let a maintainer override the runner for a one-off; this
  # is the only override path for this repo's own runs, since
  # pull_request cannot carry inputs.
  workflow_dispatch:
    inputs:
      runner:
        description: >-
          Optional runs-on override for this run, as a JSON label array
          (e.g. `["ubuntu-latest"]` or `["self-hosted","linux"]`). Takes
          precedence over the CI_BASH_RUNNER variable.
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      runner:
        description: >-
          Optional runs-on override, as a JSON label array (e.g.
          `["ubuntu-latest"]`). Takes precedence over the CI_BASH_RUNNER
          variable; consumers pass it in `with:` to override per-call.
          Leave empty to use the variable.
        required: false
        type: string
        default: ''
      bats-version:
        # Empty default delegates to the bats composite action, which
        # falls back to .github/lib/versions.env. Single source of truth -
        # set this input explicitly only to pin a different version
        # than the canonical one.
        description: >
          Override bats-core version. Empty (default) uses the
          canonical version from .github/lib/versions.env.
        required: false
        type: string
        default: ''

jobs:
  bash:
    # Runner selection, highest precedence first: the `runner` input (a
    # one-off override), else the `CI_BASH_RUNNER` variable (read from
    # the caller's repository), else the ubuntu-latest hosted default.
    # Each value is a JSON label array, e.g. ["ubuntu-latest"] or
    # ["self-hosted","linux"].
    runs-on: ${{ inputs.runner != '' && fromJSON(inputs.runner)
      || vars.CI_BASH_RUNNER != '' && fromJSON(vars.CI_BASH_RUNNER)
      || fromJSON('["ubuntu-latest"]') }}
    steps:
      - name: Check out caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # External consumers do not have Common-Automation's composites in
      # their workspace; stage them once for every `./.common-automation`
      # step below.
      - name: Stage Common-Automation composites
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: Klark-Morrigan/Common-Automation
          ref: master
          path: .common-automation
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      # check-sh-executable - cheapest gate, common Windows failure.
      # Files authored on Windows land in git as mode 0644 by default;
      # on Linux runners that breaks `bats run` (EACCES -> exit 126) and
      # any other direct script execution. The bats step catches this
      # too, but its symptom is opaque; this gives a one-line fix.
      - name: check-sh-executable (self)
        if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/check-sh-executable
      - name: check-sh-executable (consumer)
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/check-sh-executable

      # shellcheck-hooks - git hooks under .githooks/ have no .sh
      # extension (git requires exact names like pre-commit), so the
      # *.sh-globbing shellcheck-bash action cannot reach them via
      # scan-path; this composite wraps the discovery + lint.
      - name: shellcheck-hooks (self)
        if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-hooks
      - name: shellcheck-hooks (consumer)
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-hooks

      # shellcheck-runners - maintainer-side dev scripts (test runners,
      # helpers). Same strict bar as production today; the split exists
      # so the bars can diverge later without re-architecting.
      - name: shellcheck-runners (self)
        if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: scripts
      - name: shellcheck-runners (consumer)
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-bash
        with:
          scan-path: scripts

      # shellcheck-production - everything under .github held to the
      # strict bar: the composite actions in .github/actions/ and the
      # shared helpers in .github/lib (some consumer-invoked, some
      # local-only). Strictest setting non-negotiable - a regression in
      # an action ships to every downstream repo.
      - name: shellcheck-production (self)
        if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: .github
      - name: shellcheck-production (consumer)
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-bash
        with:
          scan-path: .github

      # shellcheck-domain - the repo's own production bash outside
      # .github/ and scripts/ (e.g. Infrastructure-Vm-Ansible's ops/).
      # Scans the whole workspace and prunes the trees the other steps
      # already cover (.github, scripts, .githooks), the test suites
      # (Tests/tests), and vendored or CI-injected trees (.venv,
      # node_modules, .common-automation, .git). Gating by exclusion -
      # rather than naming each domain directory - keeps a newly added
      # production directory covered automatically, in every consumer
      # repo, with no per-repo wiring to drift. Repos whose bash lives
      # entirely under .github/scripts get an empty walk and skip.
      - name: shellcheck-domain (self)
        if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: .
          exclude-paths: >-
            .git .github scripts Tests tests .venv node_modules
            .common-automation .githooks
      - name: shellcheck-domain (consumer)
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/shellcheck-bash
        with:
          scan-path: .
          exclude-paths: >-
            .git .github scripts Tests tests .venv node_modules
            .common-automation .githooks

      # bats - the test suite, heaviest step, gated last behind every
      # lint so a lint failure short-circuits before the suite spins up.
      - name: bats (self)
        if: github.repository == 'Klark-Morrigan/Common-Automation'
        uses: ./.github/actions/test-bats
        with:
          # Pass through to the action; empty value (push/PR triggers,
          # or workflow_call without override) makes the action read
          # the canonical version from .github/lib/versions.env.
          bats-version: ${{ inputs.bats-version }}
      - name: bats (consumer)
        if: github.repository != 'Klark-Morrigan/Common-Automation'
        uses: ./.common-automation/.github/actions/test-bats
        with:
          bats-version: ${{ inputs.bats-version }}
