# Lint and test bash.
#
# Production bash (.github/actions/) and runner bash (scripts/) get
# separate lint jobs so failures are attributable at a glance and the
# two categories can diverge later if their bars need to differ. Both
# currently run at shellcheck's strictest setting via the
# shellcheck-bash composite action under .github/actions/.
#
# Reusable: other repos call this workflow with no inputs. It scans
# the caller's `.github/actions/` and `scripts/` directories; missing
# directories are skipped silently.
#
#   jobs:
#     bash:
#       uses: VitaliiAndreev/GitHub-Common/.github/workflows/ci-bash.yml@master
#
# Each composite is invoked through an if-guarded pair: the `./` form
# runs on a PR to this repo so the PR's own version of the composite
# is exercised end-to-end, and the fully-qualified `@master` form runs
# for downstream consumers where the `./` path does not exist in their
# workspace.

name: ci-bash

on:
  pull_request:
  workflow_call:
    inputs:
      bats-version:
        # Empty default delegates to the bats composite action, which
        # falls back to .github/lib/versions.env. Single source of truth -
        # set this input explicitly only to pin a different version
        # than the canonical one.
        description: >
          Override bats-core version. Empty (default) uses the
          canonical version from .github/lib/versions.env.
        required: false
        type: string
        default: ''

jobs:
  # Production bash: everything under .github held to the strict bar.
  # That spans the composite actions in .github/actions/ and the
  # shared helpers in .github/lib - some consumer-invoked
  # (get-bats-version.sh, called by the test-bats action) and some
  # local-only (fix-sh-executable.sh, used by the hook and the
  # fix-permissions runner). Scanning all of .github covers them
  # regardless. Strictest setting non-negotiable - a regression in an
  # action ships to every downstream repo.
  shellcheck-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: .github

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: VitaliiAndreev/GitHub-Common/.github/actions/shellcheck-bash@master
        with:
          scan-path: .github

  # Runner bash: maintainer-side dev scripts (test runners, helpers).
  # Same strict bar as production today; the split exists so the bars
  # can diverge later without re-architecting the workflow.
  shellcheck-runners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/shellcheck-bash
        with:
          scan-path: scripts

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: VitaliiAndreev/GitHub-Common/.github/actions/shellcheck-bash@master
        with:
          scan-path: scripts

  # Git hooks under .githooks/ have no .sh extension (git requires
  # exact filenames like pre-commit), so the *.sh-globbing
  # shellcheck-bash action cannot reach them via scan-path. The
  # shellcheck-hooks composite wraps the discovery + lint.
  #
  # The other jobs in this workflow use an if-guarded pair of
  # `./.github/actions/<name>` (self-test) and
  # `VitaliiAndreev/GitHub-Common/.github/actions/<name>@master`
  # (external consumer). That shape does not work here yet because
  # GitHub Actions eagerly resolves every `@master` ref at job-prep
  # time, before step-level `if:` guards are evaluated, and the
  # shellcheck-hooks composite is being introduced in this same PR -
  # master does not contain it yet, so the @master line would fail
  # the job at prep time on every self-test run.
  #
  # The workaround is to keep every `uses:` in this job as a local
  # `./` path: local refs resolve at step-execution time, not at
  # prep time, so a missing path never trips eager resolution.
  # External consumers get a conditional sparse second checkout of
  # GitHub-Common at master that drops the composite at
  # `.gh-common/.github/actions/shellcheck-hooks`, so the external
  # `./` line has a populated path to resolve when its step runs.
  #
  # Convert to the simpler if-guarded `./` + `@master` pair in a
  # follow-up PR once shellcheck-hooks is on master.
  shellcheck-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: master
          path: .gh-common
          sparse-checkout: .github/actions/shellcheck-hooks
          sparse-checkout-cone-mode: false

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/shellcheck-hooks

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: ./.gh-common/.github/actions/shellcheck-hooks

  # Files authored on Windows land in git as mode 0644 by default. On
  # Linux runners that breaks `bats run` (EACCES -> exit 126) and any
  # other direct script execution. The bats job catches this too, but
  # its symptom ("every test fails with status mismatch") is opaque;
  # this job gives the same failure a one-line, copy-pasteable fix.
  check-sh-executable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/check-sh-executable

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: VitaliiAndreev/GitHub-Common/.github/actions/check-sh-executable@master

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/test-bats
        with:
          # Pass through to the action; empty value (push/PR triggers,
          # or workflow_call without override) makes the action read
          # the canonical version from .github/lib/versions.env.
          bats-version: ${{ inputs.bats-version }}

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: VitaliiAndreev/GitHub-Common/.github/actions/test-bats@master
        with:
          bats-version: ${{ inputs.bats-version }}
