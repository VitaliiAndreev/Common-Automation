# Lint YAML across the four complementary surfaces this repo defines.
#
# Four jobs run in parallel because the surfaces are independent and
# the tools complement rather than overlap:
#   - actionlint catches semantic workflow problems (expression typos,
#     missing run/uses, shell-script issues inside `run:` blocks).
#   - action-validator catches schema-level shape problems on BOTH
#     workflows AND composite action.yml files.
#   - yamllint catches plain-YAML style/syntax issues (trailing space,
#     duplicate keys, indentation) on everything outside the
#     actionlint / action-validator surface (Ansible, dependabot,
#     mkdocs, ...).
#   - ansible-lint catches Ansible-specific issues (playbooks, roles,
#     ansible.cfg). Auto-skips with a `::notice::` when the consumer
#     repo has none of `ansible.cfg`, `playbooks/`, `roles/` - so
#     non-Ansible consumers pay no configuration cost.
#
# All four composite actions self-resolve their pinned versions from
# .github/lib/versions.env, so no inputs are needed. Each action also
# auto-skips silently when its target surface is absent, which is what
# lets a single reusable workflow serve every consumer regardless of
# which YAML surfaces they actually use.
#
# Reusable: other repos call this workflow with no inputs.
#
#   jobs:
#     yaml:
#       uses: VitaliiAndreev/GitHub-Common/.github/workflows/ci-yaml.yml@master
#
# Expectation: the very first CI run of this workflow on this repo
# must pass. If it does not, the bar is set incorrectly - any
# findings get fixed at the composite-action layer, not by relaxing
# this workflow.
#
# Why two checkouts per job:
#   The first checkout is the consumer's code - the surface every
#   lint job actually scans. The second is a separate checkout of
#   GitHub-Common itself into `.github-common/`, used only as the
#   source of the composite actions this workflow references via
#   `uses: ./.github-common/.github/actions/<name>`. Local `./`
#   refs inside a reusable workflow resolve against the CALLER
#   repo's workspace, not this repo's, so without the second
#   checkout the composite actions are unreachable from a
#   downstream consumer.
#
#   The second checkout's `ref` is `github.workflow_sha` - the
#   commit SHA of the called workflow file. For a consumer that
#   pinned `uses: ...ci-yaml.yml@<sha>`, this resolves to <sha>, so
#   the composite actions are taken from exactly the version the
#   consumer asked for - no master-following leak across a
#   SHA-pinned boundary. For self-test, where the workflow runs
#   under a PR on this repo, `github.workflow_sha` equals
#   `github.sha`, so the PR's version of the actions is what gets
#   tested.

name: ci-yaml

on:
  pull_request:
  workflow_call:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Checkout GitHub-Common (action source)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: ${{ github.workflow_sha }}
          path: .github-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false
      - uses: ./.github-common/.github/actions/actionlint

  action-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Checkout GitHub-Common (action source)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: ${{ github.workflow_sha }}
          path: .github-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false
      - uses: ./.github-common/.github/actions/action-validator

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Checkout GitHub-Common (action source)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: ${{ github.workflow_sha }}
          path: .github-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false
      - uses: ./.github-common/.github/actions/yamllint

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Checkout GitHub-Common (action source)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: ${{ github.workflow_sha }}
          path: .github-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false
      - uses: ./.github-common/.github/actions/ansible-lint
