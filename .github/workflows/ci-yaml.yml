# Lint YAML across the four complementary surfaces this repo defines.
#
# Four jobs run in parallel because the surfaces are independent and
# the tools complement rather than overlap:
#   - actionlint catches semantic workflow problems (expression typos,
#     missing run/uses, shell-script issues inside `run:` blocks).
#   - action-validator catches schema-level shape problems on BOTH
#     workflows AND composite action.yml files.
#   - yamllint catches plain-YAML style/syntax issues (trailing space,
#     duplicate keys, indentation) on everything outside the
#     actionlint / action-validator surface (Ansible, dependabot,
#     mkdocs, ...).
#   - ansible-lint catches Ansible-specific issues (playbooks, roles,
#     ansible.cfg). Auto-skips with a `::notice::` when the consumer
#     repo has none of `ansible.cfg`, `playbooks/`, `roles/` - so
#     non-Ansible consumers pay no configuration cost.
#
# All four composite actions self-resolve their pinned versions from
# .github/lib/versions.env, so no inputs are needed. Each action also
# auto-skips silently when its target surface is absent, which is what
# lets a single reusable workflow serve every consumer regardless of
# which YAML surfaces they actually use.
#
# Every `uses:` for a GitHub-Common composite is a local `./` path,
# never a fully-qualified `@master` ref. The reason: GitHub Actions
# eagerly resolves every registry-form `uses:` at job-prep time
# before step-level `if:` guards are evaluated, so a PR that
# introduces a brand new composite would fail prep before any step
# could run. Local refs are resolved at step-execution time after
# checkout has populated the workspace, so they side-step the
# eager-resolution failure mode entirely.
#
# To make `./` work for external consumers (whose workspace does not
# contain GitHub-Common's composites), each job does a conditional
# sparse checkout of GitHub-Common at master into `.gh-common/` and
# the external branch of each if-guarded pair points there. The self
# branch points at the consumer's own workspace, so PRs to this repo
# exercise the PR's own composite code end-to-end.
#
# Reusable: other repos call this workflow with no inputs.
#
#   jobs:
#     yaml:
#       uses: VitaliiAndreev/GitHub-Common/.github/workflows/ci-yaml.yml@master

name: ci-yaml

on:
  pull_request:
  workflow_call:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: master
          path: .gh-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/actionlint

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: ./.gh-common/.github/actions/actionlint

  action-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: master
          path: .gh-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/action-validator

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: ./.gh-common/.github/actions/action-validator

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: master
          path: .gh-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/yamllint

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: ./.gh-common/.github/actions/yamllint

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: VitaliiAndreev/GitHub-Common
          ref: master
          path: .gh-common
          sparse-checkout: |
            .github/actions
            .github/lib
          sparse-checkout-cone-mode: false

      - if: github.repository == 'VitaliiAndreev/GitHub-Common'
        uses: ./.github/actions/ansible-lint

      - if: github.repository != 'VitaliiAndreev/GitHub-Common'
        uses: ./.gh-common/.github/actions/ansible-lint
